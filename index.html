<!DOCTYPE html>
    <html lang="en-US">
        <head>
            <meta name="viewport" content="width=device-width, initial-scale=1.0">
            <title>BastionGuessr</title>
            <style>
                h1 {line-height: 0.1;}
                p 
                {
                    line-height: 1;
                    font-family:verdana; 
                    color:white;
                }
                body {background-image: url('background1.png');}
                button 
                {
                    margin: 10px;
                    padding: 10px 20px;
                    font-size: 20px;
                    border-radius: 6px;
                }
                button:disabled 
                {
                    background-color: #8B0000;
                    color: #FFFFFF;
                    cursor: not-allowed;
                }         
                select 
                {
                    padding: 5px 5px;
                    font-size: 16px;
                    border-radius: 6px;
                }
                img 
                {
                    width: 1000px;
                }
                .image-container 
                {
                    width: 1000px;
                    overflow: hidden;
                }   
            </style>
        </head>
        <body>
            <center>
            <h1 style="font-family:verdana; font-size:275%;  color:white">BastionGuessr</h1>
            <p>geoguessr but for bastions</p>
            <br>
            
            <p>
            Difficulty:
            <select id="diffdrop" onchange="buildQueue(); reset()">
                <option value="-1">Any</option>
                <option value="0">Easy</option>
                <option value="1">Medium</option>
                <option value="2">Hard</option>
            </select>
            &nbsp; &nbsp; &nbsp; Mode:
            <select id="modedrop" onchange="reset()">
                <option value="0">Normal</option>
                <option value="1">Zoom</option>
            </select>
            </p>
            <div class="image-container">
            <img id="bastion">
        </div>
            <button id="Treasure" onclick="checkAnswer(this, 'Treasure')"> Treasure </button>
            <button id="Housing" onclick="checkAnswer(this, 'Housing')"> Housing </button>
            <button id="Stables" onclick="checkAnswer(this, 'Stables')"> Stables </button>
            <button id="Bridge" onclick="checkAnswer(this, 'Bridge')"> Bridge </button>
            <p id="realanswer"></p>
            <p id="streak"></p>
            <button id="reset" onclick="reset()"> Play Again </button>

            </center>
            <script>
                const imageCounts = {
                    TreasureEasy: 10,
                    TreasureMedium: 13,
                    TreasureHard: 9,
                    HousingEasy: 10,
                    HousingMedium: 9,
                    HousingHard: 14,
                    StablesEasy: 10,
                    StablesMedium: 13,
                    StablesHard: 12,
                    BridgeEasy: 10,
                    BridgeMedium: 9,
                    BridgeHard: 14
                };

                const bastions = ["Treasure", "Housing", "Stables", "Bridge"];
                const difficulties = ["Easy", "Medium", "Hard"];
                let imageQueue = [];
                let answer;
                let path;
                let guesses = 0;
                let streak = 0;
                document.getElementById("reset").style.display = 'none';
                buildQueue();
                updateImage();

                function buildQueue() 
                {
                    imageQueue = [];
                    const diff = parseInt(document.getElementById("diffdrop").value);
                    const diffOptions = diff === -1 ? [0, 1, 2] 
                                                    : [diff];

                    for (let b = 0; b < bastions.length; b++) 
                    {
                        for (let d of diffOptions) 
                        {
                            const key = bastions[b] + difficulties[d];
                            const count = imageCounts[key];
                            for (let i = 1; i <= count; i++) 
                            {
                                imageQueue.push({
                                    path: "screenshots/" + key + "/" + i + ".png",
                                    answer: bastions[b]
                                });
                            }
                        }
                    }

                    for (let i = imageQueue.length - 1; i > 0; i--) 
                    {
                        const j = Math.floor(Math.random() * (i + 1));
                        [imageQueue[i], imageQueue[j]] = [imageQueue[j], imageQueue[i]];
                    }
                }

                function updateImage() 
                {
                    if (imageQueue.length === 0) 
                    {
                        buildQueue();
                    }

                    const next = imageQueue.pop();
                    path = next.path;
                    answer = next.answer;
                    document.getElementById("bastion").src = path;
                    document.getElementById("streak").innerHTML = 'Streak: ' + streak;

                    if (document.getElementById("modedrop").value == 1) 
                    {
                        zoom(3);
                    } 
                    else 
                    {
                        zoom(1);
                    }
                }
                
                function checkAnswer(button, id)
                {
                    if (id == answer)
                    {
                        button.style.backgroundColor = 'green';
                        zoom(1);
                        if (guesses == 0)
                        {
                            streak = streak + 1;
                        }
                        document.getElementById("streak").innerHTML = 'Streak: ' + streak;
                        for (let rep = 0; rep < bastions.length; rep = rep + 1)
                        {
                            document.getElementById(bastions[rep]).disabled = true;
                        }
                        document.getElementById("reset").style.display = 'inline';
                    }
                    else
                    {
                        streak = 0;
                        document.getElementById("streak").innerHTML = 'Streak: ' + streak;
                        button.disabled = true;
                        guesses = guesses + 1;
                        if (document.getElementById("modedrop").value == 1)
                        {
                            if (guesses == 1)
                            {
                                zoom(2.5)
                            }
                            else if (guesses == 2)
                            {
                                zoom(1.5)
                            }
                        }
                        if (guesses >= 3)
                        {
                            zoom(1);
                            document.getElementById("realanswer").style.display = 'block';
                            document.getElementById("realanswer").innerHTML = "Answer was: " + answer;
                            document.getElementById("reset").style.display = 'inline';
                        }
                    }
                }

                function reset()
                {
                    updateImage();
                    for (let rep = 0; rep < bastions.length; rep = rep + 1)
                    {
                        document.getElementById(bastions[rep]).disabled = false;
                        document.getElementById(bastions[rep]).style.backgroundColor = '';
                    }
                    document.getElementById("reset").style.display = 'none';
                    document.getElementById("realanswer").style.display = 'none'
                    guesses = 0;
                }

                function zoom(scale) 
                {
                    const img = document.getElementById("bastion")
                    img.style.transform = `scale(${scale})`;
                }
            </script>
        </body>
    </html>
